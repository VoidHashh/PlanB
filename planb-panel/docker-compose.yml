version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: planb-panel_server_1
      APP_PORT: 8787

  server:
    image: ghcr.io/voidhashh/planb-app:latest
    restart: on-failure
    stop_grace_period: 1m
    environment:
      # Cotizaciones de la sección Inversión: el propio servidor refresca
      # data/quotes.json (Yahoo Finance, sin API key). Sin contenedores extra.
      QUOTES_FETCH: "1"
      FETCH_INTERVAL: "90"   # minutos (1–2 h)
      FX_FALLBACK: "1.159"
      # Sección Saldos (watch-only): Electrs local de tu nodo. Umbrel inyecta estas
      # variables al declarar 'electrs' en dependencies (umbrel-app.yml). El xpub se
      # deriva en local y solo se consulta a tu Electrs por TCP; nunca sale del nodo.
      ELECTRUM_HOST: $APP_ELECTRS_NODE_IP
      ELECTRUM_PORT: $APP_ELECTRS_NODE_PORT
    volumes:
      - ${APP_DATA_DIR}/data:/app/data
