description: >-
  Tu panel personal en local: compras y ventas de BTC, carteras consolidadas,
  préstamos con colateral (LTV, liquidación, ajuste de colateral) y gráficos,
  una sección de Inversión (fondos, ETCs y acciones por bloques con rebalanceo
  por aportación y cotizaciones automáticas), más el presupuesto de casa a
  partir de extractos bancarios (ING, Santander, PayPal). Todos los datos se
  guardan en el propio servidor, con copias automáticas.
